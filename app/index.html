<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Azure Test Plans Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-button:hover {
            transform: translateY(-2px);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .test-credentials {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            font-size: 12px;
        }

        .test-credentials h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .test-credentials p {
            color: #666;
            margin: 5px 0;
        }

        .dashboard {
            display: none;
            text-align: center;
        }

        .dashboard h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 10px;
        }

        .card p {
            font-size: 32px;
            font-weight: bold;
        }

        .logout-button {
            margin-top: 30px;
            padding: 10px 30px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-button:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Login Form -->
        <div id="loginForm">
            <div class="login-header">
                <h1>🚀 Azure Test Plans</h1>
                <p>Demo Application</p>
            </div>

            <div class="error-message" id="errorMessage">
                Invalid username or password
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" id="login" class="login-button">
                    Login
                </button>
            </form>

            <div class="test-credentials">
                <h3>🧪 Test Credentials</h3>
                <p><strong>Valid:</strong> admin / admin123</p>
                <p><strong>Invalid:</strong> user / wrongpass</p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <h1>📊 Dashboard</h1>
            <p>Welcome, <span id="welcomeUser"></span>!</p>

            <div class="dashboard-cards">
                <div class="card">
                    <h3>Test Plans</h3>
                    <p>12</p>
                </div>
                <div class="card">
                    <h3>Test Cases</h3>
                    <p>48</p>
                </div>
                <div class="card">
                    <h3>Passed</h3>
                    <p>42</p>
                </div>
                <div class="card">
                    <h3>Failed</h3>
                    <p>6</p>
                </div>
            </div>

            <button onclick="handleLogout()" class="logout-button">
                Logout
            </button>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            // Valid credentials for testing
            if (username === 'admin' && password === 'admin123') {
                errorMessage.style.display = 'none';
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('welcomeUser').textContent = username;
                document.title = 'Dashboard - Azure Test Plans Demo';
            } else {
                errorMessage.style.display = 'block';
            }
        }

        function handleLogout() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMessage').style.display = 'none';
            document.title = 'Login - Azure Test Plans Demo';
        }
    </script>
</body>
</html>
